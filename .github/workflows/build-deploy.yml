name: Build and Deploy - Kiosko Web

on:
  push:
    branches:
      - dev

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install

      - name: Build
        run: yarn build
        env:
          NEXT_PUBLIC_API_URL: https://dev.apidevlab.com/kiosko-api

      - name: Create standalone deployment package
        run: |
          # Next.js standalone output includes only necessary files
          cp -r public .next/standalone/
          cp -r .next/static .next/standalone/.next/
          tar -czf deploy.tar.gz -C .next/standalone .

      - name: Upload artifact to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          source: deploy.tar.gz
          target: /tmp/

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            set -e
            APP_DIR=/home/app/kiosko_web

            echo "📦 Extracting standalone build..."
            # Backup current deploy
            [ -d "$APP_DIR/.next" ] && rm -rf "$APP_DIR/.next_backup" && mv "$APP_DIR/.next" "$APP_DIR/.next_backup" || true
            
            cd $APP_DIR
            tar -xzf /tmp/deploy.tar.gz
            rm -f /tmp/deploy.tar.gz

            echo "🚀 Restarting with PM2..."
            pm2 restart kiosko-web || pm2 start ecosystem.config.js --only kiosko-web

            echo "✅ kiosko-web deployed successfully"
            pm2 status kiosko-web
